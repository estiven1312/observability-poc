input {
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  if [service] {
    mutate {
      add_field => { "service_name" => "%{[service]}" }
    }
  } else {
    mutate {
      add_field => { "service_name" => "unknown" }
    }
  }

  mutate {
    remove_field => ["service"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "app-%{[service_name]}-%{+YYYY.MM.dd}"  # prefijo app- en vez de logs-
  }
}