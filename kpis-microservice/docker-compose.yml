services:
  postgres:
    labels:
      com.docker.compose.service: "postgres-kpis"
    image: postgres:16-alpine
    container_name: kpis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kpisdb
      POSTGRES_USER: kpis_user
      POSTGRES_PASSWORD: kpis_pass
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpis_user -d kpisdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  kpis-microservice:
    labels:
      com.docker.compose.service: "kpis-microservice"
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kpis-microservice
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kpisdb
      SPRING_DATASOURCE_USERNAME: kpis_user
      SPRING_DATASOURCE_PASSWORD: kpis_pass
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
